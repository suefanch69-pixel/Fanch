<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>K-pop 灵魂本命女团测验</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
}

body{
background:#fff;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
overflow:hidden;
color:#222;
}

.container{
width:100%;
max-width:700px;
padding:32px;
}

.card{
background:#fff;
border-radius:26px;
padding:40px;
box-shadow:0 20px 60px rgba(0,0,0,.08);
animation:fade .45s ease;
}

@keyframes fade{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.title{
font-size:40px;
font-weight:800;
text-align:center;
margin-bottom:18px;
}

.subtitle{
text-align:center;
color:#777;
line-height:1.7;
margin-bottom:38px;
}

.main-btn{
width:100%;
padding:18px;
border:none;
border-radius:18px;
font-size:20px;
font-weight:700;
color:white;
cursor:pointer;
background:linear-gradient(135deg,#ff84c1,#8bb7ff);
transition:.3s;
}

.main-btn:hover{
transform:translateY(-3px);
box-shadow:0 12px 28px rgba(255,120,180,.35);
}

.progress{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:30px;
}

.progress span{
font-weight:700;
font-size:18px;
color:#666;
}

.bar{
height:10px;
background:#eee;
border-radius:999px;
overflow:hidden;
flex:1;
margin-left:20px;
}

.fill{
height:100%;
width:0;
background:linear-gradient(90deg,#ff7eb3,#7db6ff);
transition:.35s;
}

.question{
font-size:30px;
font-weight:800;
line-height:1.5;
margin-bottom:30px;
}

.option{
padding:18px 22px;
border:2px solid #eee;
border-radius:18px;
margin-bottom:16px;
cursor:pointer;
font-size:18px;
transition:.25s;
}

.option:hover{
background:linear-gradient(135deg,#ffe7f3,#eef4ff);
border-color:#ff8dc4;
transform:translateX(5px);
}

.result{
text-align:center;
}

.badge{
display:inline-block;
padding:10px 24px;
border-radius:999px;
background:linear-gradient(135deg,#ff7eb3,#7db6ff);
color:white;
font-weight:700;
margin-bottom:22px;
}

.result h2{
font-size:46px;
margin-bottom:20px;
}

.result p{
font-size:19px;
line-height:1.9;
color:#555;
margin-bottom:35px;
}

.btn-group{
display:flex;
gap:16px;
}

.btn-group button{
flex:1;
padding:16px;
border:none;
border-radius:16px;
cursor:pointer;
font-size:17px;
font-weight:700;
color:white;
background:linear-gradient(135deg,#ff7eb3,#7db6ff);
transition:.25s;
}

.btn-group button:hover{
transform:translateY(-2px);
}

.toast{
position:fixed;
bottom:40px;
left:50%;
transform:translateX(-50%);
background:#222;
color:white;
padding:12px 22px;
border-radius:999px;
opacity:0;
transition:.35s;
}

.toast.show{
opacity:1;
}

.hidden{
display:none;
}
</style>
</head>

<body>

<div class="container">

<div id="start" class="card">
<div class="title">🎧 K-pop 灵魂本命女团测验</div>
<div class="subtitle">
回答 8 个简单的问题，看看与你灵魂最契合的 K-pop 女团是谁。
</div>
<button class="main-btn" onclick="startQuiz()">开始测试</button>
</div>

<div id="quiz" class="card hidden">
<div class="progress">
<span id="count"></span>
<div class="bar">
<div class="fill" id="fill"></div>
</div>
</div>

<div class="question" id="question"></div>

<div id="options"></div>

</div>

<div id="result" class="card hidden">
<div class="result">

<div class="badge">
✨ 灵魂本命女团 ✨
</div>

<h2>TWICE</h2>

<p>
你天生自带让人治愈的经典 Diva 气场。<br><br>
优雅、重情重义，且极具舞台感染力。<br><br>
你与九位九色、永远充满爱与羁绊的她们拥有
<b>100%</b>
的灵魂契合度！
</p>

<div class="btn-group">
<button onclick="restart()">重新测试</button>
<button onclick="share()">分享结果</button>
</div>

</div>
</div>

</div>

<div class="toast" id="toast">已复制分享文案！</div>

<script>

const questions=[

{
q:"如果要开启美好的一天，你的耳机里会播放什么？",
a:[
"慵懒舒适的清晨 R&B",
"让人一秒清醒的元气神曲",
"节拍强劲的硬核重低音"
]
},

{
q:"在一个重情重义的团队里，你通常觉得自己是？",
a:[
"默默付出的守护者",
"活跃气氛的快乐喷泉",
"审美在线的灵魂向导"
]
},

{
q:"如果去现场看演唱会，你最期待哪一个瞬间？",
a:[
"全场大合唱的震撼与感动",
"成员们在台上高能的 Dance Break",
"充满未来科技感的舞美特效"
]
},

{
q:"朋友们心情低落时，你通常会怎么安慰他们？",
a:[
"陪他们去吃顿好吃的，或者看场电影",
"讲笑话、搞怪，努力逗笑对方",
"理性分析，给对方最硬核的建议"
]
},

{
q:"盲选一个你最欣赏的舞台特质？",
a:[
"经典的 Diva 级高音与超稳唱功",
"让人忍不住跟着一起跳的超强感染力",
"走在时尚最前沿的视觉与概念"
]
},

{
q:"如果拥有一次完美的假期，你最想去哪里？",
a:[
"去充满复古气息的浪漫都市",
"和最重要的人一起去海边度假",
"去科技感十足的未来感街区"
]
},

{
q:"你觉得自己在面对压力时，最大的武器是？",
a:[
"优雅沉着，保持内在的节奏",
"积极乐观，自带治愈同伴的能量",
"自信独立，用硬核的实力说话"
]
},

{
q:"最后一个问题，你对音乐最纯粹的期待是？",
a:[
"带来长久的陪伴与治愈",
"传递毫无保留的快乐与爱",
"带来打破常规的震撼与灵感"
]
}

];

let current=0;

function startQuiz(){
document.getElementById("start").classList.add("hidden");
document.getElementById("quiz").classList.remove("hidden");
showQuestion();
}

function showQuestion(){

const q=questions[current];

document.getElementById("count").innerHTML=`${current+1}/8`;

document.getElementById("fill").style.width=((current+1)/8*100)+"%";

document.getElementById("question").innerHTML=q.q;

const box=document.getElementById("options");

box.innerHTML="";

["A","B","C"].forEach((l,i)=>{

const div=document.createElement("div");

div.className="option";

div.innerHTML=`<b>${l}.</b> ${q.a[i]}`;

div.onclick=next;

box.appendChild(div);

});

}

function next(){

current++;

if(current<questions.length){

showQuestion();

}else{

document.getElementById("quiz").classList.add("hidden");

document.getElementById("result").classList.remove("hidden");

}

}

function restart(){

current=0;

document.getElementById("result").classList.add("hidden");

document.getElementById("quiz").classList.remove("hidden");

showQuestion();

}

function share(){

const text=`🎧 我测出来的 K-pop 灵魂本命女团是：TWICE！

你天生自带让人治愈的经典 Diva 气场。
优雅、重情重义，且极具舞台感染力。
与九位九色的 TWICE 灵魂契合度：100%！`;

navigator.clipboard.writeText(text);

const t=document.getElementById("toast");

t.classList.add("show");

setTimeout(()=>{
t.classList.remove("show");
},1800);

}

</script>

</body>
</html>
